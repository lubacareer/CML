version: 2.1

jobs:
  validate:
    docker:
      - image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install dependencies
          command: npm ci --cache ~/.npm --prefer-offline
      - save_cache:
          key: npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Unit tests
          command: npm test
      - run:
          name: Build
          command: npm run build
      - run:
          name: Playwright e2e tests
          command: npm run test:e2e
      - store_artifacts:
          path: test-results
          destination: playwright-test-results

workflows:
  validate:
    jobs:
      - validate
